---
- name: "Get system architecture"
  ansible.builtin.command:
    cmd: "dpkg --print-architecture"
  register: "system_arch"
  changed_when: false

- name: "Check if Github CLI gpg is registered"
  ansible.builtin.stat:
    path: "/etc/apt/keyrings/githubcli-archive-keyring.gpg"
  register: "github_cli_gpg_registered"

- name: "Create keyrings directory"
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: "directory"
    mode: "0755"
  when: "not github_cli_gpg_registered.stat.exists"

- name: "Download GitHub CLI GPG key"
  ansible.builtin.get_url:
    url: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
    dest: "/etc/apt/keyrings/githubcli-archive-keyring.gpg"
    owner: "root"
    group: "root"
    mode: "0644"
  when: "not github_cli_gpg_registered.stat.exists"

- name: "Add GitHub CLI repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ system_arch }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    state: "present"
    filename: "github-cli"
  when: "not github_cli_gpg_registered.stat.exists"

- name: "Update apt cache update"
  ansible.builtin.apt:
    update_cache: true

- name: "Install GitHub CLI"
  ansible.builtin.apt:
    name: "gh"
    state: "present"
